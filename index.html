/* ---------------------------- Scoring engine ---------------------------- */
const KOREKSI = [1, 2, 1, 0, 3, -1, 0, -4];

function computeScores(answers) {
  const jumlah = [];
  for (let c = 1; c <= 8; c++) {
    let Ac = 0;
    for (let q = 8 * (c - 1) + 1; q <= 8 * c; q++) if (answers[q] === "a") Ac++;
    let Bc = 0;
    for (let k = 0; k < 8; k++) { const q = c + 8 * k; if (answers[q] === "b") Bc++; }
    jumlah.push(Ac + Bc + KOREKSI[c - 1]);
  }
  const TO = jumlah[2] + jumlah[3] + jumlah[6] + jumlah[7];
  const RO = jumlah[1] + jumlah[3] + jumlah[5] + jumlah[7];
  const E  = jumlah[4] + jumlah[5] + jumlah[6] + jumlah[7];
  const O  = jumlah[0];

  const konversi = (x) => {
    if (x < 30) return 0;
    if (x < 32) return 0.6;
    if (x === 32) return 1.2;
    if (x === 33) return 1.8;
    if (x === 34) return 2.4;
    if (x === 35) return 3;
    if (x < 38) return 3.6;
    return 4;
  };

  const TOc = konversi(TO), ROc = konversi(RO), Ec = konversi(E);
  const hiTO = TOc > 2, hiRO = ROc > 2, hiE = Ec > 2;

  let archetype;
  if (hiTO && hiRO && hiE) archetype = "executive";
  else if (hiTO && hiRO && !hiE) archetype = "compromiser";
  else if (hiTO && !hiRO && hiE) archetype = "benevolent_autocrat";
  else if (hiTO && !hiRO && !hiE) archetype = "autocrat";
  else if (!hiTO && hiRO && hiE) archetype = "developer";
  else if (!hiTO && hiRO && !hiE) archetype = "missionary";
  else if (!hiTO && !hiRO && hiE) archetype = "bureaucrat";
  else archetype = "deserter";

  return { jumlah, TO, RO, E, O, TOc, ROc, Ec, archetype };
}

function selectAnswer(qno, letter) {
  state.answers[qno] = letter;
  render();
}
function nextQuestion() {
  if (!state.answers[QUESTIONS[state.qIndex].no]) return;
  if (state.qIndex < QUESTIONS.length - 1) setState({ qIndex: state.qIndex + 1 });
}
function prevQuestion() {
  if (state.qIndex > 0) setState({ qIndex: state.qIndex - 1 });
}

async function finishQuiz() {
  if (!state.answers[QUESTIONS[state.qIndex].no] || state.submitting) return;
  setState({ submitting: true });
  const scores = computeScores(state.answers);
  const payload = {
    full_name: state.candidate.full_name,
    email: state.candidate.email,
    position: state.candidate.position,
    experience_years: state.candidate.experience_years,
    answers: state.answers,
    jumlah: scores.jumlah,
    score_to: scores.TO,
    score_ro: scores.RO,
    score_e: scores.E,
    score_o: scores.O,
    archetype: scores.archetype,
  };
  try {
    const { error } = await supabaseClient.from(CONFIG.TABLE).insert(payload);
    if (error) console.error("Supabase insert error:", error);
  } catch (err) {
    console.error(err);
  }
  setState({ submitting: false, view: "candidate-thanks" });
}

  setState({ loadingCandidates: true });
  try {
    const { data, error } = await supabaseClient
      .from(CONFIG.TABLE)
      .select("*")
      .order("created_at", { ascending: false });
    if (error) { console.error(error); setState({ loadingCandidates: false, candidates: [] }); return; }
    setState({ candidates: data || [], loadingCandidates: false });
  } catch (err) {
    console.error(err);
    setState({ loadingCandidates: false });
  }
}

function subscribeRealtime() {
  if (state.realtimeChannel) return;
  const channel = supabaseClient
    .channel("public:" + CONFIG.TABLE)
    .on("postgres_changes", { event: "*", schema: "public", table: CONFIG.TABLE }, () => loadCandidates())
    .subscribe();
  state.realtimeChannel = channel;
}

function archetypeBadge(key) {
  const a = ARCHETYPES[key] || { label: key, color: "slate" };
  const colorMap = {
    indigo: "bg-indigo-50 text-indigo-700 border-indigo-200",
    emerald: "bg-emerald-50 text-emerald-700 border-emerald-200",
    amber: "bg-amber-50 text-amber-700 border-amber-200",
    slate: "bg-slate-100 text-slate-700 border-slate-200",
    orange: "bg-orange-50 text-orange-700 border-orange-200",
    rose: "bg-rose-50 text-rose-700 border-rose-200",
    red: "bg-red-50 text-red-700 border-red-200",
    gray: "bg-gray-100 text-gray-700 border-gray-200",
  };
  return `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold border ${colorMap[a.color]||colorMap.slate}">${a.label}</span>`;
}

function getFilteredCandidates() {
  const s = state.search.trim().toLowerCase();
  return state.candidates.filter(c => {
    const matchesSearch = !s || c.full_name.toLowerCase().includes(s) || c.email.toLowerCase().includes(s);
    const matchesArchetype = !state.filterArchetype || c.archetype === state.filterArchetype;
    const matchesPosition = !state.filterPosition || c.position === state.filterPosition;
    return matchesSearch && matchesArchetype && matchesPosition;
  });
}

function quadrantSVG(candidates) {
  const W = 560, H = 420, pad = 46;
  const plotW = W - pad*2, plotH = H - pad*2;
  const minV = 8, maxV = 56, mid = 33.5;
  const xOf = (v) => pad + ((v - minV) / (maxV - minV)) * plotW;
  const yOf = (v) => pad + plotH - ((v - minV) / (maxV - minV)) * plotH;
  const midX = xOf(mid), midY = yOf(mid);

  const dots = candidates.map(c => {
    const x = xOf(c.score_to), y = yOf(c.score_ro);
    const hiE = c.score_e > 33.5;
    const fill = hiE ? "#4f46e5" : "#f43f5e";
    return `<g class="cursor-pointer" onclick="openDetail('${c.id}')">
      <circle cx="${x}" cy="${y}" r="6.5" fill="${fill}" fill-opacity="0.85" stroke="white" stroke-width="1.5"/>
      <title>${escapeHtml(c.full_name)} — ${ARCHETYPES[c.archetype]?.label || c.archetype}</title>
    </g>`;
  }).join("");

  return `
  <svg viewBox="0 0 ${W} ${H}" class="w-full h-auto">
    <rect x="${pad}" y="${pad}" width="${plotW/2}" height="${plotH/2}" fill="#eef2ff" opacity="0.5"/>
    <rect x="${midX}" y="${pad}" width="${plotW/2}" height="${plotH/2}" fill="#f0fdf4" opacity="0.5"/>
    <rect x="${pad}" y="${midY}" width="${plotW/2}" height="${plotH/2}" fill="#fff7ed" opacity="0.5"/>
    <rect x="${midX}" y="${midY}" width="${plotW/2}" height="${plotH/2}" fill="#fef2f2" opacity="0.5"/>
    <line x1="${pad}" y1="${midY}" x2="${W-pad}" y2="${midY}" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="${midX}" y1="${pad}" x2="${midX}" y2="${H-pad}" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="${pad}" y="${pad}" width="${plotW}" height="${plotH}" fill="none" stroke="#94a3b8" stroke-width="1"/>
    <text x="${W/2}" y="${H-14}" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600">Task Orientation (TO) →</text>
    <text x="16" y="${H/2}" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600" transform="rotate(-90 16 ${H/2})">Relationship Orientation (RO) →</text>
    <text x="${pad+6}" y="${pad+16}" font-size="11" fill="#94a3b8">Missionary / Developer</text>
    <text x="${W-pad-6}" y="${pad+16}" text-anchor="end" font-size="11" fill="#94a3b8">Executive / Compromiser</text>
    <text x="${pad+6}" y="${H-pad-8}" font-size="11" fill="#94a3b8">Deserter / Bureaucrat</text>
    <text x="${W-pad-6}" y="${H-pad-8}" text-anchor="end" font-size="11" fill="#94a3b8">Autocrat / Ben. Autocrat</text>
    ${dots}
  </svg>
  <div class="flex items-center gap-4 mt-3 text-xs text-slate-500">
    <span class="inline-flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-indigo-600"></span> Efektivitas tinggi</span>
    <span class="inline-flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-rose-500"></span> Efektivitas rendah</span>
  </div>`;
}

function renderRecruiterDashboard() {
  const filtered = getFilteredCandidates();
  const positions = [...new Set(state.candidates.map(c => c.position))];

  const rows = filtered.map(c => `
    <tr class="hover:bg-slate-50 transition cursor-pointer" onclick="openDetail('${c.id}')">
      <td class="px-4 py-3 text-sm font-medium text-slate-900">${escapeHtml(c.full_name)}</td>
      <td class="px-4 py-3 text-sm text-slate-500">${escapeHtml(c.email)}</td>
      <td class="px-4 py-3 text-sm text-slate-600">${escapeHtml(c.position)}</td>
      <td class="px-4 py-3 text-sm text-slate-600">${c.experience_years} th</td>
      <td class="px-4 py-3 text-sm text-slate-500">${new Date(c.created_at).toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"})}</td>
      <td class="px-4 py-3 text-sm text-center text-slate-700 font-medium">${c.score_to}</td>
      <td class="px-4 py-3 text-sm text-center text-slate-700 font-medium">${c.score_ro}</td>
      <td class="px-4 py-3 text-sm text-center text-slate-700 font-medium">${c.score_e}</td>
      <td class="px-4 py-3">${archetypeBadge(c.archetype)}</td>
      <td class="px-4 py-3 text-right">
        <button onclick="event.stopPropagation(); openDetail('${c.id}')" class="text-slate-400 hover:text-indigo-600 transition">${icon("eye","w-4 h-4")}</button>
      </td>
    </tr>`).join("");

  return `
  <div class="min-h-screen bg-slate-50 fade-in">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-9 h-9 rounded-lg bg-slate-900 text-white flex items-center justify-center">${icon("layout-dashboard","w-5 h-5")}</div>
          <div>
            <h1 class="font-bold text-slate-900 text-sm sm:text-base leading-tight">Recruiter Executive Dashboard</h1>
            <p class="text-xs text-slate-400">Management Style Diagnostic Test</p>
          </div>
        </div>
        <button onclick="setState({view:'home', recruiterAuthed:false})" class="text-sm text-slate-500 hover:text-slate-800 inline-flex items-center gap-1">
          ${icon("log-out","w-4 h-4")} Keluar
        </button>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        ${statCard("users", "Total Kandidat", state.candidates.length)}
        ${statCard("award", "Archetype Terbanyak", topArchetypeLabel())}
        ${statCard("trending-up", "Rata-rata TO", avgOf("score_to"))}
        ${statCard("heart-handshake", "Rata-rata RO", avgOf("score_ro"))}
      </div>

      <div class="grid lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white border border-slate-200 rounded-xl shadow-sm p-5">
          <div class="flex flex-col sm:flex-row sm:items-center gap-3 justify-between mb-4">
            <h2 class="font-semibold text-slate-900 text-sm">Data Kandidat</h2>
            <div class="flex flex-col sm:flex-row gap-2">
              <div class="relative">
                ${icon("search","w-4 h-4 absolute left-2.5 top-2.5 text-slate-400")}
                <input value="${escapeHtml(state.search)}" oninput="setState({search:this.value})" placeholder="Cari nama / email..."
                  class="pl-8 pr-3 py-1.5 text-sm rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none w-full sm:w-56">
              </div>
              <select onchange="setState({filterArchetype:this.value})" class="text-sm rounded-lg border border-slate-300 px-2 py-1.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="">Semua Archetype</option>
                ${ARCHETYPE_ORDER.map(k => `<option value="${k}" ${state.filterArchetype===k?"selected":""}>${ARCHETYPES[k].label}</option>`).join("")}
              </select>
              <select onchange="setState({filterPosition:this.value})" class="text-sm rounded-lg border border-slate-300 px-2 py-1.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="">Semua Posisi</option>
                ${positions.map(p => `<option value="${escapeHtml(p)}" ${state.filterPosition===p?"selected":""}>${escapeHtml(p)}</option>`).join("")}
              </select>
            </div>
          </div>

          <div class="overflow-x-auto -mx-5">
            <div class="inline-block min-w-full align-middle px-5">
              ${state.loadingCandidates ? `
                <div class="flex items-center justify-center py-16"><div class="spinner"></div></div>
              ` : filtered.length === 0 ? `
                <div class="text-center py-16 text-sm text-slate-400">Belum ada data kandidat yang cocok.</div>
              ` : `
              <table class="min-w-full divide-y divide-slate-200">
                <thead>
                  <tr class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">
                    <th class="px-4 py-2">Nama</th>
                    <th class="px-4 py-2">Email</th>
                    <th class="px-4 py-2">Posisi</th>
                    <th class="px-4 py-2">Pengalaman</th>
                    <th class="px-4 py-2">Tanggal</th>
                    <th class="px-4 py-2 text-center">TO</th>
                    <th class="px-4 py-2 text-center">RO</th>
                    <th class="px-4 py-2 text-center">E</th>
                    <th class="px-4 py-2">Archetype</th>
                    <th class="px-4 py-2"></th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">${rows}</tbody>
              </table>`}
            </div>
          </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
          <h2 class="font-semibold text-slate-900 text-sm mb-1">Peta Kuadran Manajerial</h2>
          <p class="text-xs text-slate-400 mb-3">Task Orientation vs Relationship Orientation</p>
          ${quadrantSVG(filtered)}
        </div>
      </div>

      <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
        <h2 class="font-semibold text-slate-900 text-sm mb-4">8 Arketipe Gaya Manajemen</h2>
        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
          ${ARCHETYPE_ORDER.map(k => `
            <div class="border border-slate-200 rounded-lg p-4">
              <div class="flex items-center justify-between mb-2">
                <span class="font-semibold text-sm text-slate-900">${ARCHETYPES[k].label}</span>
                ${archetypeBadge(k)}
              </div>
              <p class="text-xs text-slate-500 leading-relaxed">${ARCHETYPES[k].desc}</p>
            </div>`).join("")}
        </div>
      </div>
    </main>
  </div>
  ${state.detailCandidate ? renderDetailModal(state.detailCandidate) : ""}`;
}

function statCard(iconName, label, value) {
  return `
  <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-4">
    <div class="flex items-center gap-2 text-slate-400 mb-2">${icon(iconName,"w-4 h-4")}<span class="text-xs font-medium uppercase tracking-wide">${label}</span></div>
    <div class="text-xl font-bold text-slate-900">${value}</div>
  </div>`;
}
function avgOf(field) {
  if (!state.candidates.length) return "-";
  const v = state.candidates.reduce((s,c)=>s+Number(c[field]||0),0)/state.candidates.length;
  return v.toFixed(1);
}
function topArchetypeLabel() {
  if (!state.candidates.length) return "-";
  const counts = {};
  state.candidates.forEach(c => counts[c.archetype] = (counts[c.archetype]||0)+1);
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  return top ? (ARCHETYPES[top[0]]?.label || top[0]) : "-";
}

function openDetail(id) {
  const c = state.candidates.find(x => x.id === id);
  setState({ detailCandidate: c || null });
}
function closeDetail() { setState({ detailCandidate: null }); }

function renderDetailModal(c) {
  const arch = ARCHETYPES[c.archetype] || { label: c.archetype, desc: "" };
  const answerRows = QUESTIONS.map(q => {
    const ans = c.answers[q.no] || c.answers[String(q.no)];
    return `<div class="py-2 border-b border-slate-100 last:border-0">
      <div class="text-xs text-slate-400 mb-1">Pernyataan ${q.no}</div>
      <div class="text-sm text-slate-700">${escapeHtml(ans==='a'?q.a:q.b)} <span class="text-xs text-slate-400">(pilihan ${(ans||'-').toUpperCase()})</span></div>
    </div>`;
  }).join("");

  return `
  <div class="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50 fade-in" onclick="if(event.target===this) closeDetail()">
    <div id="printableModal" class="bg-white rounded-xl shadow-lg max-w-2xl w-full max-h-[85vh] flex flex-col">
      <div class="flex items-start justify-between p-5 border-b border-slate-200">
        <div>
          <h3 class="font-bold text-slate-900 text-lg">${escapeHtml(c.full_name)}</h3>
          <p class="text-sm text-slate-500">${escapeHtml(c.email)} · ${escapeHtml(c.position)} · ${c.experience_years} th pengalaman</p>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="window.print()" class="no-print inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-semibold transition">
            ${icon("printer","w-4 h-4")} Print Report
          </button>
          <button onclick="closeDetail()" class="no-print text-slate-400 hover:text-slate-700">${icon("x")}</button>
        </div>
      </div>
      <div class="p-5 border-b border-slate-100 bg-slate-50/50">
        <div class="grid grid-cols-4 gap-3 text-center mb-4">
          <div class="bg-white p-3 rounded-lg border border-slate-200"><div class="text-xs text-slate-400">Task (TO)</div><div class="font-bold text-slate-900 text-base">${c.score_to}</div></div>
          <div class="bg-white p-3 rounded-lg border border-slate-200"><div class="text-xs text-slate-400">Relationship (RO)</div><div class="font-bold text-slate-900 text-base">${c.score_ro}</div></div>
          <div class="bg-white p-3 rounded-lg border border-slate-200"><div class="text-xs text-slate-400">Efektivitas (E)</div><div class="font-bold text-slate-900 text-base">${c.score_e}</div></div>
          <div class="bg-white p-3 rounded-lg border border-slate-200 flex flex-col items-center justify-center"><div class="text-xs text-slate-400 mb-1">Arketipe</div>${archetypeBadge(c.archetype)}</div>
        </div>
        <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-3.5 text-xs text-indigo-900 leading-relaxed">
          <span class="font-semibold block mb-1">Analisis Gaya Manajemen (${arch.label}):</span>
          ${arch.desc}
        </div>
      </div>
      <div class="p-5 overflow-y-auto flex-1">
        <p class="text-xs font-semibold uppercase text-slate-400 mb-3 tracking-wider">Detail Jawaban Asesmen (${QUESTIONS.length} Pernyataan)</p>
        <div class="space-y-1">${answerRows}</div>
      </div>
    </div>
  </div>`;
}

/* --------------------------------- Router --------------------------------- */
function render() {
  const app = $("#app");
  let html = "";
  switch (state.view) {
    case "home": html = renderHome(); break;
    case "candidate-register": html = renderCandidateRegister(); break;
    case "candidate-quiz": html = renderCandidateQuiz(); html = renderCandidateQuiz(); break;
    case "candidate-thanks": html = renderCandidateThanks(); break;
    case "recruiter-pin": html = renderRecruiterPin(); break;
    case "recruiter-dashboard": html = renderRecruiterDashboard(); break;
    default: html = renderHome();
  }
  app.innerHTML = html;
  refreshIcons();
}

render();
</script>
</body>
</html>
